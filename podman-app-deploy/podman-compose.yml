version: "3.9"

services:
  db:
    image: docker.io/library/postgres:16-alpine
    container_name: opensourcetech-db
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: opensourcetech
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:Z
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d opensourcetech"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Containerfile
    container_name: opensourcetech-api
    environment:
      DATABASE_URL: postgresql+asyncpg://appuser:${POSTGRES_PASSWORD:-changeme}@db:5432/opensourcetech
      API_HOST: 0.0.0.0
      API_PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
